spring.application.name=frauddetection

# ==============================================================================
# ENVIRONMENT ROUTING PROFILE
# ==============================================================================
# Dynamic placeholder: Reads the environment variable runtime flag, defaults to local
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ==============================================================================
# ACTUATOR METRICS & LIFECYCLE MANAGEMENT (ACCEPTANCE CRITERIA)
# ==============================================================================
# Enable Graceful Shutdown
server.shutdown=graceful
# Gives active inbound transactions up to 30 seconds to finish before forcing a termination
spring.lifecycle.timeout-per-shutdown-phase=30s

# Core Actuator Endpoint Exposure
management.endpoints.web.exposure.include=health,info,prometheus
# Hardening (FRAUD-124): only authorized (ADMIN) callers see component details / internals;
# anonymous probes get just the aggregate UP/DOWN status.
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized
management.endpoint.health.roles=ADMIN
# Kubernetes-style liveness/readiness probes. Liveness stays minimal (livenessState only) so a
# transient dependency blip never triggers a restart; readiness gates on the datasource, Redis and
# a loaded model so traffic is only routed when the instance can actually score.
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,db,redis,modelRegistry
# Tolerate profiles where db/redis/modelRegistry contributors are absent (e.g. no-datasource local).
management.endpoint.health.validate-group-membership=false

# ==============================================================================
# DISTRIBUTED TRACING (FRAUD-120) — OpenTelemetry over OTLP
# ==============================================================================
# Sample every request in dev; lower TRACING_SAMPLE_RATE (e.g. 0.1) in prod.
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}
# W3C trace-context is propagated across Kafka headers and HTTP automatically
# (the W3C propagator is registered explicitly in TracingConfig).
management.otlp.tracing.endpoint=${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

# ==============================================================================
# JPA / HIBERNATE
# ==============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==============================================================================
# FLYWAY
# ==============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==============================================================================
# SPRINGDOC OPENAPI
# ==============================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.bragdev.frauddetection
springdoc.default-produces-media-type=application/json

# ==============================================================================
# JACKSON
# ==============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ==============================================================================
# KAFKA SERIALIZATION (JSON with type headers)
# ==============================================================================
# Producer publishes domain event records as JSON, stamping a __TypeId__ header.
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Consumer wraps JsonDeserializer in ErrorHandlingDeserializer so a poison message is logged
# and skipped instead of stalling the listener container.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
# Only deserialize event types from our own event package (prevents forged-type-header attacks).
spring.kafka.consumer.properties.spring.json.trusted.packages=com.bragdev.frauddetection.common.event
# Observe producer/consumer operations so trace context propagates across Kafka headers (FRAUD-120).
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# ==============================================================================
# JWT SECURITY
# ==============================================================================
fraud.security.jwt.secret=${JWT_SECRET:default-secret-key-change-in-production-minimum-32-bytes-long}
fraud.security.jwt.access-ttl=PT15M
fraud.security.jwt.refresh-ttl=P7D
fraud.security.jwt.issuer=fraud-detection-system
fraud.security.jwt.audience=fraud-detection-api

# ==============================================================================
# ML SERVICE
# ==============================================================================
fraud.ml-service.base-url=${ML_SERVICE_URL:http://localhost:8000}

# ==============================================================================
# DECISION ENGINE
# ==============================================================================
fraud.decision.weight.ml=0.6
fraud.decision.weight.rules=0.4
fraud.decision.threshold.approve=0.3
fraud.decision.threshold.decline=0.7

# ==============================================================================
# RESILIENCE4J
# ==============================================================================
resilience4j.circuitbreaker.instances.mlService.sliding-window-size=10
resilience4j.circuitbreaker.instances.mlService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mlService.wait-duration-in-open-state=PT30S
resilience4j.circuitbreaker.instances.mlService.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.mlService.max-attempts=2
resilience4j.retry.instances.mlService.wait-duration=PT1S
