spring.application.name=frauddetection

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/fraud_db
spring.datasource.username=fraud_user
spring.datasource.password=fraud_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=fraud-detection-group
spring.kafka.consumer.auto-offset-reset=earliest
