spring.application.name=frauddetection

# ==============================================================================
# ENVIRONMENT ROUTING PROFILE
# ==============================================================================
# Dynamic placeholder: Reads the environment variable runtime flag, defaults to local
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ==============================================================================
# ACTUATOR METRICS & LIFECYCLE MANAGEMENT (ACCEPTANCE CRITERIA)
# ==============================================================================
# Enable Graceful Shutdown
server.shutdown=graceful
# Gives active inbound transactions up to 30 seconds to finish before forcing a termination
spring.lifecycle.timeout-per-shutdown-phase=30s

# Core Actuator Endpoint Exposure
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# ==============================================================================
# JPA / HIBERNATE
# ==============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==============================================================================
# FLYWAY
# ==============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==============================================================================
# SPRINGDOC OPENAPI
# ==============================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.bragdev.frauddetection
springdoc.default-produces-media-type=application/json

# ==============================================================================
# JACKSON
# ==============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ==============================================================================
# JWT SECURITY
# ==============================================================================
fraud.security.jwt.secret=${JWT_SECRET:default-secret-key-change-in-production-minimum-32-bytes-long}
fraud.security.jwt.access-ttl=PT15M
fraud.security.jwt.refresh-ttl=PT7D
fraud.security.jwt.issuer=fraud-detection-system
fraud.security.jwt.audience=fraud-detection-api

# ==============================================================================
# ML SERVICE
# ==============================================================================
fraud.ml-service.base-url=${ML_SERVICE_URL:http://localhost:8000}

# ==============================================================================
# DECISION ENGINE
# ==============================================================================
fraud.decision.weight.ml=0.6
fraud.decision.weight.rules=0.4
fraud.decision.threshold.approve=0.3
fraud.decision.threshold.decline=0.7

# ==============================================================================
# RESILIENCE4J
# ==============================================================================
resilience4j.circuitbreaker.instances.mlService.sliding-window-size=10
resilience4j.circuitbreaker.instances.mlService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mlService.wait-duration-in-open-state=PT30S
resilience4j.circuitbreaker.instances.mlService.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.mlService.max-attempts=2
resilience4j.retry.instances.mlService.wait-duration=PT1S
