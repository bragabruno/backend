spring.application.name=frauddetection

# ==============================================================================
# ENVIRONMENT ROUTING PROFILE
# ==============================================================================
# Dynamic placeholder: Reads the environment variable runtime flag, defaults to local
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ==============================================================================
# ACTUATOR METRICS & LIFECYCLE MANAGEMENT (ACCEPTANCE CRITERIA)
# ==============================================================================
# Enable Graceful Shutdown
server.shutdown=graceful
# Gives active inbound transactions up to 30 seconds to finish before forcing a termination
spring.lifecycle.timeout-per-shutdown-phase=30s

# Core Actuator Endpoint Exposure
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# ==============================================================================
# JPA / HIBERNATE
# ==============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==============================================================================
# FLYWAY
# ==============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==============================================================================
# SPRINGDOC OPENAPI
# ==============================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.bragdev.frauddetection
springdoc.default-produces-media-type=application/json

# ==============================================================================
# JACKSON
# ==============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
