# ==============================================================================
# ENTERPRISE CONFIGURATION LOADER
# ==============================================================================
# Steps up one level out of the /app module to pull keys directly from the root .env file
spring.config.import=optional:file:../.env[.properties]

# ==============================================================================
# SERVER & ACTIVE RUNTIME ENVIRONMENT
# ==============================================================================
server.port=${SERVER_PORT:8080}

# ==============================================================================
# CORE SECURITY LAYER
# ==============================================================================
spring.security.user.name=${SPRING_SECURITY_USER_NAME}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD}

# ==============================================================================
# INFRASTRUCTURE DATASTORES (LOCAL DECOUPLING OVERRIDES ACTIVE)
# ==============================================================================
# PostgreSQL Data Layer Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Cache Layer Configuration
spring.data.redis.host=${SPRING_REDIS_HOST}
spring.data.redis.port=${SPRING_REDIS_PORT}

# Apache Kafka Event Streaming Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=fraud-detection-group
spring.kafka.consumer.auto-offset-reset=earliest

# ==============================================================================
# LOCAL INFRASTRUCTURE AUTOMATION BYPASS RULES
# ==============================================================================
# 1. Turn off physical JDBC database and Redis socket connection checks on startup
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# 2. Prevent Kafka background listeners from blocking initialization when the broker is offline
spring.kafka.listener.auto-startup=false
