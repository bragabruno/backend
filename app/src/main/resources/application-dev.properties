server.port=8080

# Dev Shared Infrastructure Configuration
spring.datasource.url=jdbc:postgresql://dev-aurora-cluster-internal:5432/fraud_db_dev
spring.datasource.username=fraud_dev_user
spring.datasource.password=secure_dev_password_here
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Dev Cache & Streams Broker Locations
spring.data.redis.host=dev-redis-cluster-internal
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=dev-kafka-broker-01:9092,dev-kafka-broker-02:9092
spring.kafka.consumer.group-id=fraud-detection-dev-group
spring.kafka.consumer.auto-offset-reset=earliest
