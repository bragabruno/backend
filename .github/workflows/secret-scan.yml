name: Secret Scan

# Prevents credentials/keys from being committed (FRAUD-128 — "no secrets in code/images").
# Complements GitHub's native secret scanning with an explicit, blocking CI gate.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --config=/repo/.gitleaks.toml --no-git --redact --no-banner --verbose
